name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          AUTH_GITHUB_ID: ci-placeholder
          AUTH_GITHUB_SECRET: ci-placeholder
          AUTH_SECRET: ci-placeholder
          RESEND_API_KEY: ci-placeholder
          STRIPE_SECRET_KEY: sk_test_ci-placeholder
